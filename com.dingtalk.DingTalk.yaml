id: com.dingtalk.DingTalk
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: dingtalk
separate-locales: false

finish-args:
  - --share=ipc
  - --share=network
  - --socket=x11
  - --socket=pulseaudio
  - --device=all
  # Notification
  - --talk-name=org.freedesktop.Notifications
  # System tray icon
  - --own-name=org.kde.*
  # File system
  - --filesystem=xdg-download
  - --filesystem=xdg-run/pipewire-0:ro

cleanup:
  - /include
  - /lib/pkgconfig
  - /libexec
  - /share/doc
  - /share/licenses
  - /share/man
  - '*.la'
  - '*.a'

modules:
  - name: libxcrypt
    buildsystem: autotools
    make-install-args:
      - PREFIX=/app
    sources:
      - type: git
        url: https://github.com/besser82/libxcrypt.git
        tag: v4.4.38
        commit: 55ea777e8d567e5e86ffac917c28815ac54cc341
        x-checker-data:
          type: git
          url: https://api.github.com/repos/besser82/libxcrypt/releases/latest
          tag-query: ".tag_name"

  - name: dingtalk
    buildsystem: simple
    build-commands:
      - install -Dpm755 apply_extra ${FLATPAK_DEST}/bin/apply_extra
      - install -Dpm755 dingtalk.sh $FLATPAK_DEST/bin/dingtalk
      - install -Dpm644 com.dingtalk.DingTalk.metainfo.xml -t ${FLATPAK_DEST}/share/metainfo
      - install -Dpm644 com.dingtalk.DingTalk.png -t ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps
      - install -Dpm644 com.dingtalk.DingTalk.desktop -t ${FLATPAK_DEST}/share/applications
    sources:
      - type: script
        dest-filename: apply_extra
        commands:
          - bsdtar -O -xf dingtalk.deb data.* | bsdtar --no-same-owner -xf -
          - mv opt/apps/com.alibabainc.dingtalk/files dingtalk
          - rm -rf dingtalk/*-Release.*/{libGLdispatch.so*,libGLX.so*,libm.so*,libstdc++.so*,libcurl.so*,libz.so*,Resources/qss/mac}
          - rm -rf dingtalk.deb usr opt
          - |
            python3 -c '
            import sys, struct, glob
            def fix_elf(path):
                try:
                    with open(path, "r+b") as f:
                        f.seek(32)
                        phoff = struct.unpack("<Q", f.read(8))[0]
                        f.seek(54)
                        phentsize, phnum = struct.unpack("<HH", f.read(4))
                        for i in range(phnum):
                            offset = phoff + i * phentsize
                            f.seek(offset)
                            if struct.unpack("<I", f.read(4))[0] == 0x6474e551:
                                f.seek(offset + 4)
                                flags = struct.unpack("<I", f.read(4))[0]
                                f.seek(offset + 4)
                                f.write(struct.pack("<I", flags & ~1))
                                return
                except Exception as e:
                    pass
            for file in glob.glob("dingtalk/*-Release.*/*.so"):
                fix_elf(file)
            '

      - type: file
        path: dingtalk.sh

      - type: file
        path: com.dingtalk.DingTalk.metainfo.xml

      - type: file
        path: com.dingtalk.DingTalk.png

      - type: file
        path: com.dingtalk.DingTalk.desktop

      - type: extra-data
        filename: dingtalk.deb
        only-arches: [x86_64]
        url: https://dtapp-pub.dingtalk.com/dingtalk-desktop/xc_dingtalk_update/linux_deb/Release/com.alibabainc.dingtalk_8.1.0.6021101_amd64.deb
        sha256: ec492f12feabece34702ea47e3cfc1a164ae2e8dabdee9b05e74a3a5e4de21d5
        size: 404869700
        x-checker-data:
          type: rotating-url
          url: https://www.dingtalk.com/win/d/qd=linux_amd64
          pattern: https://dtapp-pub.dingtalk.com/dingtalk-desktop/xc_dingtalk_update/linux_deb/Release/com.alibabainc.dingtalk_([0-9.]+)_amd64.deb

      - type: extra-data
        filename: dingtalk.deb
        only-arches: [aarch64]
        url: https://dtapp-pub.dingtalk.com/dingtalk-desktop/xc_dingtalk_update/linux_deb/Release/com.alibabainc.dingtalk_8.1.0.6021101_arm64.deb
        sha256: 48428f7295869815900c341867bbbd279b0eb172364287dd78bb21cedfb499ef
        size: 405399416
        x-checker-data:
          type: rotating-url
          url: https://www.dingtalk.com/win/d/qd=linux_arm64
          pattern: https://dtapp-pub.dingtalk.com/dingtalk-desktop/xc_dingtalk_update/linux_deb/Release/com.alibabainc.dingtalk_([0-9.]+)_arm64.deb
